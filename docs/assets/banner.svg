<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 500" width="1600" height="500" role="img" aria-label="trend-trading banner">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0a1628"/>
      <stop offset="50%" stop-color="#0c1a2c"/>
      <stop offset="100%" stop-color="#0a1628"/>
    </linearGradient>
    <pattern id="dots" width="40" height="40" patternUnits="userSpaceOnUse">
      <circle cx="1" cy="1" r="0.6" fill="#1a3a52" opacity="0.55"/>
    </pattern>
    <linearGradient id="trendLine" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#2dd4bf" stop-opacity="0.7"/>
      <stop offset="50%" stop-color="#2dd4bf" stop-opacity="1"/>
      <stop offset="100%" stop-color="#2dd4bf" stop-opacity="0.7"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1600" height="500" fill="url(#bg)"/>
  <rect width="1600" height="500" fill="url(#dots)"/>

  <!-- ====== LEFT PANEL (text) ====== -->
  <rect x="40" y="40" width="860" height="420" rx="10" fill="#0f1d2e" stroke="#1a3a52" stroke-width="1" opacity="0.65"/>

  <!-- Top label: SYSTEMATIC TREND ANALYSIS -->
  <circle cx="92" cy="98" r="4.5" fill="#2dd4bf"/>
  <text x="108" y="104" font-family="ui-monospace, 'SF Mono', 'Cascadia Code', Consolas, monospace"
        font-size="14" font-weight="700" fill="#2dd4bf" letter-spacing="2.2">SYSTEMATIC TREND ANALYSIS</text>

  <!-- Up-arrow icon (rounded square) -->
  <rect x="74" y="130" width="68" height="68" rx="12" fill="none" stroke="#2dd4bf" stroke-width="2.2"/>
  <polyline points="92,182 108,165 124,175 140,148" stroke="#2dd4bf" stroke-width="3.2"
            fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  <polygon points="140,148 128,144 134,158" fill="#2dd4bf"/>

  <!-- Title -->
  <text x="162" y="186" font-family="system-ui, -apple-system, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif"
        font-size="68" font-weight="800" fill="#ffffff" letter-spacing="-2">trend-trading</text>

  <!-- Chinese tagline -->
  <text x="74" y="240" font-family="system-ui, -apple-system, 'PingFang SC', 'Microsoft YaHei', sans-serif"
        font-size="20" fill="#8b9eb0">给一个代码,告诉你现在处于趋势的哪一阶段。</text>

  <!-- English subtitle (monospace) -->
  <text x="74" y="270" font-family="ui-monospace, 'SF Mono', 'Cascadia Code', Consolas, monospace"
        font-size="13" fill="#8b9eb0">Regime · Stage · Signal · ATR-based risk — from one reproducible command.</text>

  <!-- Terminal-style code block -->
  <rect x="74" y="295" width="780" height="90" rx="10" fill="#0a1628" stroke="#1a3a52" stroke-width="1.2"/>
  <circle cx="100" cy="320" r="5" fill="#f87171"/>
  <circle cx="118" cy="320" r="5" fill="#facc15"/>
  <circle cx="136" cy="320" r="5" fill="#2dd4bf"/>
  <text x="74" y="350" font-family="ui-monospace, 'SF Mono', 'Cascadia Code', Consolas, monospace"
        font-size="15" fill="#2dd4bf">$ python -m trend_trading analyze &lt;symbol&gt;</text>
  <text x="74" y="372" font-family="ui-monospace, 'SF Mono', 'Cascadia Code', Consolas, monospace"
        font-size="13" fill="#8b9eb0">→ regime · stage · signal · key levels · position size</text>

  <!-- Bottom-left tag -->
  <text x="74" y="430" font-family="ui-monospace, 'SF Mono', monospace"
        font-size="12" font-weight="700" fill="#2dd4bf" letter-spacing="1.8">OPEN SOURCE · PYTHON · CTA / TREND FOLLOWING</text>

  <!-- ====== RIGHT PANEL (TREND CYCLE chart) ====== -->
  <rect x="940" y="40" width="620" height="420" rx="10" fill="#0f1d2e" stroke="#1a3a52" stroke-width="1" opacity="0.65"/>

  <!-- TREND CYCLE title + tagline -->
  <text x="970" y="98" font-family="ui-monospace, 'SF Mono', 'Cascadia Code', monospace"
        font-size="20" font-weight="700" fill="#ffffff" letter-spacing="2.5">TREND CYCLE</text>
  <circle cx="1186" cy="91" r="4" fill="#2dd4bf"/>
  <text x="1198" y="95" font-family="ui-monospace, 'SF Mono', monospace"
        font-size="12" fill="#8b9eb0">rules, not intuition</text>

  <!-- Legend -->
  <g font-family="ui-monospace, 'SF Mono', monospace" font-size="12" fill="#8b9eb0">
    <line x1="970" y1="128" x2="1015" y2="128" stroke="#2dd4bf" stroke-width="2.5"/>
    <text x="1022" y="132">EMA 50</text>

    <line x1="1130" y1="128" x2="1175" y2="128" stroke="#a78bfa" stroke-width="2.5"/>
    <text x="1182" y="132">EMA 100</text>

    <line x1="1290" y1="128" x2="1335" y2="128" stroke="#2dd4bf" stroke-width="1.5" stroke-dasharray="5,3"/>
    <text x="1342" y="132">Donchian</text>
  </g>

  <!-- Chart grid (subtle) -->
  <g stroke="#1a3a52" stroke-width="0.5" opacity="0.45">
    <line x1="970" y1="170" x2="1530" y2="170"/>
    <line x1="970" y1="220" x2="1530" y2="220"/>
    <line x1="970" y1="270" x2="1530" y2="270"/>
    <line x1="970" y1="320" x2="1530" y2="320"/>
    <line x1="970" y1="370" x2="1530" y2="370"/>
    <line x1="1050" y1="160" x2="1050" y2="400"/>
    <line x1="1170" y1="160" x2="1170" y2="400"/>
    <line x1="1290" y1="160" x2="1290" y2="400"/>
    <line x1="1410" y1="160" x2="1410" y2="400"/>
  </g>

  <!-- Donchian channel (dashed teal) — expanding envelope -->
  <path d="M 990,375 C 1060,368 1110,360 1170,345 S 1280,275 1340,205 S 1450,90 1510,95"
        stroke="#2dd4bf" stroke-width="1.4" stroke-dasharray="5,3" fill="none" opacity="0.55"/>
  <path d="M 990,385 C 1060,382 1110,378 1170,372 S 1280,330 1340,265 S 1450,150 1510,180"
        stroke="#2dd4bf" stroke-width="1.4" stroke-dasharray="5,3" fill="none" opacity="0.55"/>

  <!-- EMA 100 (purple) -->
  <path d="M 990,378 C 1050,372 1110,365 1170,355 S 1260,335 1310,300 S 1390,200 1450,165 S 1500,200 1525,260"
        stroke="#a78bfa" stroke-width="2" fill="none" opacity="0.75"/>

  <!-- EMA 50 (teal) -->
  <path d="M 990,380 C 1050,376 1110,370 1170,360 S 1250,340 1300,295 S 1380,180 1430,135 S 1490,180 1525,300"
        stroke="#2dd4bf" stroke-width="2.4" fill="none" opacity="0.85"/>

  <!-- Main trend line (thicker teal, the hero) -->
  <path d="M 990,382 C 1040,378 1080,372 1130,360 S 1210,330 1260,275 S 1340,150 1395,95 S 1450,140 1480,260 S 1500,340 1525,380"
        stroke="url(#trendLine)" stroke-width="3.8" fill="none" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- 4 stage markers (circles) on the curve -->
  <!-- 01·BASE: bottom-left start -->
  <circle cx="1000" cy="380" r="9" fill="#0a1628" stroke="#2dd4bf" stroke-width="2.5"/>
  <!-- 02·TREND: mid rising -->
  <circle cx="1265" cy="248" r="9" fill="#0a1628" stroke="#2dd4bf" stroke-width="2.5"/>
  <!-- 03·TRANSITION: peak -->
  <circle cx="1395" cy="95" r="9" fill="#0a1628" stroke="#facc15" stroke-width="2.5"/>
  <!-- 04·DECLINE: dropping right -->
  <circle cx="1525" cy="378" r="9" fill="#0a1628" stroke="#f87171" stroke-width="2.5"/>

  <!-- 4 stage labels at bottom of right panel -->
  <g font-family="ui-monospace, 'SF Mono', monospace" font-size="11" font-weight="700">
    <rect x="958" y="412" width="118" height="30" rx="15" fill="none" stroke="#2dd4bf" stroke-width="1.3"/>
    <text x="1017" y="431" text-anchor="middle" fill="#2dd4bf">01 · BASE</text>

    <rect x="1086" y="412" width="142" height="30" rx="15" fill="none" stroke="#2dd4bf" stroke-width="1.3"/>
    <text x="1157" y="431" text-anchor="middle" fill="#2dd4bf">02 · TREND</text>

    <rect x="1238" y="412" width="170" height="30" rx="15" fill="none" stroke="#facc15" stroke-width="1.3"/>
    <text x="1323" y="431" text-anchor="middle" fill="#facc15">03 · TRANSITION</text>

    <rect x="1418" y="412" width="132" height="30" rx="15" fill="none" stroke="#f87171" stroke-width="1.3"/>
    <text x="1484" y="431" text-anchor="middle" fill="#f87171">04 · DECLINE</text>
  </g>

  <!-- Bottom right: GitHub URL -->
  <text x="1530" y="478" text-anchor="end"
        font-family="ui-monospace, 'SF Mono', 'Cascadia Code', Consolas, monospace"
        font-size="12" fill="#2dd4bf">github.com/lilechen/trend-trading</text>
</svg>
